<!doctype html>
<html lang="en" dir="ltr">
    <head>
        <base href="/" />
        <meta charset="UTF-8" />
        <meta name="robots" content="noindex, nofollow" />
        <meta name="color-scheme" content="dark only" />
        <meta name="theme-color" content="#161B23" />
        <meta name="viewport" content="minimum-scale=1, initial-scale=1, width=device-width, user-scalable=no" />
        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
        <link rel="icon" sizes="32x32" type="image/png" href="/assets/favicon-32x32.png" />
        <link rel="icon" sizes="16x16" type="image/png" href="/assets/favicon-16x16.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180x180.png" />

        <link rel="preconnect" crossorigin="anonymous" href="https://fonts.googleapis.com" />
        <link rel="preconnect" crossorigin="anonymous" href="https://fonts.gstatic.com" />

        <link
            href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Unbounded:wght@200..900&display=swap"
            rel="stylesheet"
        />
        <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <meta name="description" content="{{.MetaDescription}}" />
        <title>{{.MetaTitle}}</title>

        <style>
            html,
            body {
                margin: 0;
                background: #161b23;
            }

            #initial-loader {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #161b23;
            }

            #initial-loader .spinner {
                width: 48px;
                height: 48px;
                border: 3px solid rgb(255 255 255 / 15%);
                border-top-color: #22d3ee;
                border-radius: 50%;
                animation: initial-loader-spin 0.8s linear infinite;
            }

            @keyframes initial-loader-spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div id="initial-loader">
                <div class="spinner"></div>
            </div>
        </div>
        <script type="module" src="./src/main.tsx"></script>

        <div id="sbpg" data-panel="{{.PanelData}}"></div>
    </body>
</html>
